name: Update Plugin Stars

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plugin-stars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch plugin stars
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python fetch_plugin_stars.py --output plugins-stars.json

      - name: Publish data branch
        env:
          TARGET_BRANCH: plugin-stars-data
          TARGET_FILE: plugins-stars.json
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          cp "$TARGET_FILE" "$tmp_dir/$TARGET_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" > /dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH:$TARGET_BRANCH"
            git switch "$TARGET_BRANCH"
          else
            git switch --orphan "$TARGET_BRANCH"
            git rm -rf .
          fi

          cp "$tmp_dir/$TARGET_FILE" "$TARGET_FILE"
          git add "$TARGET_FILE"

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit \
            -m "chore: update plugin stars data" \
            -m "- Overwrite plugins-stars.json with latest repository metrics"
          git push origin "$TARGET_BRANCH"
