name: Update Plugin Stars

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-plugin-stars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch plugin stars
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python fetch_plugin_stars.py --output plugins-stars.json

      - name: Publish data branch
        env:
          TARGET_BRANCH: plugin-stars-data
          TARGET_FILE: plugins-stars.json
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          cp "$TARGET_FILE" "$tmp_dir/$TARGET_FILE"
          rm -f "$TARGET_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git switch --orphan "$TARGET_BRANCH"
          git rm -rf --ignore-unmatch .

          cp "$tmp_dir/$TARGET_FILE" "$TARGET_FILE"
          git add "$TARGET_FILE"

          git commit \
            -m "chore: 覆盖插件星标数据" \
            -m "- 使用最新生成的 plugins-stars.json 覆盖数据分支"
          git push --force origin HEAD:"$TARGET_BRANCH"
